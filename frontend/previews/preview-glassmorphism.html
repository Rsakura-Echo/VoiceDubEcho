<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceDub — 现代玻璃拟态风</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F0F4FF; --surface: rgba(255,255,255,0.72); --surface-solid: #FFFFFF;
    --border: rgba(0,0,0,0.06); --border-solid: #E2E8F0;
    --text: #1E293B; --text2: #64748B; --text3: #94A3B8;
    --accent: #6366F1; --accent2: #4F46E5; --accent-bg: rgba(99,102,241,0.06);
    --success: #10B981; --warning: #F59E0B; --danger: #EF4444;
    --radius: 14px; --radius-sm: 10px;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.06);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #F0F4FF 0%, #F8FAFC 30%, #F5F3FF 70%, #EEF2FF 100%);
    color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh;
  }
  /* Subtle radial gradient overlay */
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 30%, rgba(139,92,246,0.03) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  /* Top Bar — glass */
  #topbar {
    background: rgba(255,255,255,0.7); backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 52px; position: sticky; top: 0; z-index: 100;
  }
  #brand { color: var(--accent); font-weight: 700; font-size: 16px; cursor: pointer; letter-spacing: -0.5px; }
  #version { font-size: 11px; color: var(--text3); font-weight: 500; margin-left: 4px; }
  #topbar nav { display: flex; gap: 2px; }
  #topbar nav button {
    font-size: 12px; font-weight: 500; color: var(--text2); background: transparent;
    border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  #topbar nav button:hover { background: rgba(99,102,241,0.06); color: var(--accent); }
  #topbar nav button.active { background: rgba(99,102,241,0.1); color: var(--accent); font-weight: 600; }

  main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; position: relative; z-index: 1; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .page-header h2 { font-size: 18px; font-weight: 600; }
  .back-link {
    font-size: 12px; color: var(--text2); cursor: pointer; padding: 6px 14px;
    background: var(--surface); backdrop-filter: blur(12px); border: 1px solid var(--border);
    border-radius: 20px; transition: all 0.15s;
  }
  .back-link:hover { border-color: var(--accent); color: var(--accent); }

  /* Status Bar — glass panel */
  .status-bar {
    background: var(--surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 18px; margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    box-shadow: var(--shadow-card);
  }
  .btn { font-size: 12px; font-weight: 500; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
  .btn-accent { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,0.25); }
  .btn-accent:hover { background: var(--accent2); box-shadow: 0 4px 16px rgba(99,102,241,0.35); transform: translateY(-1px); }
  .btn-outline { background: var(--surface); border: 1px solid var(--border-solid); color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
  .btn-ghost { background: transparent; color: var(--text2); }
  .btn-ghost:hover { color: var(--accent); background: var(--accent-bg); }

  .speaker-filter { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; font-size: 12px; }
  .speaker-filter label { display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text2); margin: 0; font-size: 12px; }
  .speaker-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  input[type="checkbox"] { accent-color: var(--accent); }

  /* Segment Card — glass */
  .segment-card {
    background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 4px; transition: all 0.2s; box-shadow: var(--shadow-card);
  }
  .segment-card:hover { border-color: rgba(99,102,241,0.2); box-shadow: 0 4px 16px rgba(99,102,241,0.06); }
  .seg-header {
    display: flex; align-items: center; gap: 10px; padding: 12px 18px;
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .seg-speaker {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 14px;
    letter-spacing: 0.3px;
  }
  .seg-time { font-size: 11px; color: var(--text3); font-weight: 500; font-variant-numeric: tabular-nums; }
  .seg-badge {
    font-size: 10px; background: rgba(16,185,129,0.08); color: var(--success);
    padding: 2px 10px; border-radius: 12px; font-weight: 500;
  }
  .seg-spacer { flex: 1; }
  .seg-actions { display: flex; gap: 6px; align-items: center; }
  .btn-sm {
    font-size: 11px; padding: 5px 12px; border-radius: 7px; font-weight: 500;
    cursor: pointer; font-family: inherit; border: none; transition: all 0.15s;
  }
  .btn-sm.accent { background: var(--accent); color: #fff; }
  .btn-sm.accent:hover { background: var(--accent2); }
  .btn-sm.outline { background: transparent; border: 1px solid var(--border-solid); color: var(--text2); }
  .btn-sm.outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.success { background: rgba(16,185,129,0.08); color: var(--success); }
  .btn-sm.success:hover { background: rgba(16,185,129,0.15); }
  .btn-sm.ghost { color: var(--text2); background: transparent; padding: 4px 8px; }
  .btn-sm.ghost:hover { background: rgba(0,0,0,0.03); }

  .seg-body { display: flex; flex-direction: column; gap: 10px; padding: 14px 18px; }
  .text-row { display: flex; gap: 10px; align-items: flex-start; }
  .play-dot {
    width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; background: rgba(99,102,241,0.06); transition: all 0.2s; color: var(--accent);
  }
  .play-dot:hover { background: var(--accent); color: #fff; box-shadow: 0 2px 12px rgba(99,102,241,0.3); }
  .play-dot svg { width: 10px; height: 10px; fill: currentColor; }
  .text-orig {
    flex: 1; padding: 10px 14px; background: rgba(0,0,0,0.015);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text2); line-height: 1.6; word-break: break-word;
  }
  textarea.text-edit {
    flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.6);
    border: 1px solid var(--border-solid); border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text); font-family: inherit;
    resize: vertical; min-height: 38px; line-height: 1.6;
  }
  textarea.text-edit:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.08); background: #fff; }

  .seg-between {
    height: 22px; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .seg-between:hover { opacity: 1; }
  .seg-between-inner { display: flex; gap: 6px; }

  .emo-btn {
    font-size: 11px; padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border-solid);
    background: var(--surface); color: var(--text2); cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .emo-btn.active { background: var(--accent-bg); color: var(--accent); border-color: rgba(99,102,241,0.2); }

  /* Task Panel — glass */
  #task-panel {
    position: fixed; bottom: 0; right: 20px; width: 310px;
    background: rgba(255,255,255,0.82); backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid var(--border); border-radius: 14px 14px 0 0;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.06); z-index: 100; font-size: 12px;
  }
  #task-panel-header {
    padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between;
    font-weight: 600; border-radius: 14px 14px 0 0; user-select: none;
  }
  #task-panel-body { padding: 8px 16px 14px; max-height: 200px; overflow-y: auto; }
  .task-item { padding: 6px 0; font-size: 11px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .task-item:last-child { border-bottom: none; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
</style>
</head>
<body>

<header id="topbar">
  <div style="display:flex;align-items:baseline;gap:4px">
    <span id="brand">VoiceDub</span>
    <span id="version">v1.0.0</span>
  </div>
  <nav>
    <button class="active">项目</button>
    <button>音色库</button>
    <button>模型管理</button>
    <button>设置</button>
  </nav>
</header>

<main>
  <div class="page-header">
    <span class="back-link">← 返回</span>
    <h2>配音项目_2026-06-03</h2>
    <div></div>
  </div>

  <div class="status-bar">
    <button class="btn btn-accent">批量配音</button>
    <button class="btn btn-outline" style="color:var(--accent);border-color:rgba(99,102,241,0.2);">批量克隆</button>
    <button class="btn btn-outline">导出音频</button>
    <button class="btn btn-outline">SRT</button>
    <button class="btn btn-outline">ASS</button>
  </div>

  <div class="speaker-filter">
    <label><input type="checkbox" checked> 全选</label>
    <span style="color:var(--text3);font-size:11px">说话人:</span>
    <label style="color:#6366F1"><span class="speaker-dot" style="background:#6366F1"></span> <input type="checkbox" checked> 张三</label>
    <label style="color:#EC4899"><span class="speaker-dot" style="background:#EC4899"></span> <input type="checkbox" checked> 李四</label>
    <label style="color:#F59E0B"><span class="speaker-dot" style="background:#F59E0B"></span> <input type="checkbox" checked> 王五</label>
  </div>

  <div id="segments">
    <div class="segment-card">
      <div class="seg-header">
        <input type="checkbox" class="seg-checkbox" checked>
        <span class="seg-speaker" style="background:rgba(99,102,241,0.08);color:#6366F1">张三</span>
        <span class="seg-time">0.0s – 3.2s</span>
        <span class="seg-badge">已配音</span>
        <span class="seg-spacer"></span>
        <div class="seg-actions">
          <button class="emo-btn active">情绪 ●</button>
          <button class="btn-sm accent">重新配音</button>
          <button class="btn-sm outline">克隆配音</button>
          <button class="btn-sm success">下载配音</button>
        </div>
      </div>
      <div class="seg-body">
        <div class="text-row">
          <span class="play-dot"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <div class="text-orig">大家好，欢迎收听今天的节目。今天我们聊一个有趣的话题。</div>
        </div>
        <div class="text-row">
          <span class="play-dot"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <textarea class="text-edit">大家好，欢迎收听今天的节目。今天我们聊一个有趣的话题。</textarea>
        </div>
      </div>
    </div>

    <div class="seg-between"><div class="seg-between-inner"><button class="btn-sm ghost">+ 插入</button><button class="btn-sm ghost">⇅ 合并</button></div></div>

    <div class="segment-card">
      <div class="seg-header">
        <input type="checkbox" class="seg-checkbox" checked>
        <span class="seg-speaker" style="background:rgba(236,72,153,0.08);color:#EC4899">李四</span>
        <span class="seg-time">3.5s – 7.8s</span>
        <span class="seg-spacer"></span>
        <div class="seg-actions">
          <button class="emo-btn">情绪</button>
          <button class="btn-sm accent">开始配音</button>
          <button class="btn-sm outline">克隆配音</button>
        </div>
      </div>
      <div class="seg-body">
        <div class="text-row">
          <span class="play-dot"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <div class="text-orig">是啊，这个话题确实很有意思，我也一直想聊。</div>
        </div>
        <div class="text-row">
          <span class="play-dot" style="visibility:hidden"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <textarea class="text-edit" placeholder="编辑台词...">是啊，这个话题确实很有意思，我也一直想聊。</textarea>
        </div>
      </div>
    </div>

    <div class="seg-between"><div class="seg-between-inner"><button class="btn-sm ghost">+ 插入</button><button class="btn-sm ghost">⇅ 合并</button></div></div>

    <div class="segment-card">
      <div class="seg-header">
        <input type="checkbox" class="seg-checkbox" checked>
        <span class="seg-speaker" style="background:rgba(245,158,11,0.08);color:#F59E0B">王五</span>
        <span class="seg-time">8.1s – 12.6s</span>
        <span class="seg-badge">已配音</span>
        <span class="seg-spacer"></span>
        <div class="seg-actions">
          <button class="emo-btn active">情绪 ●</button>
          <button class="btn-sm accent">重新配音</button>
          <button class="btn-sm outline">克隆配音</button>
          <button class="btn-sm success">下载配音</button>
        </div>
      </div>
      <div class="seg-body">
        <div class="text-row">
          <span class="play-dot"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <div class="text-orig">那我们开始吧，先从第一个问题说起。</div>
        </div>
        <div class="text-row">
          <span class="play-dot"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <textarea class="text-edit">那我们开始吧，先从第一个问题说起。</textarea>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="task-panel">
  <div id="task-panel-header"><span>任务</span><span style="color:var(--accent)">2</span></div>
  <div id="task-panel-body">
    <div class="task-item"><span>批量配音 · 张三 0.0–3.2s</span><span style="color:var(--success)">✓ 完成 2.1s</span></div>
    <div class="task-item"><span>批量配音 · 王五 8.1–12.6s</span><span style="color:var(--accent)">处理中...</span></div>
  </div>
</div>

</body>
</html>
