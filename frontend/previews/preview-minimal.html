<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceDub — 极简白风</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF; --surface: #FAFAFA;
    --border: #F0F0F0; --border-strong: #E5E5E5;
    --text: #171717; --text2: #737373; --text3: #A3A3A3;
    --accent: #171717; --accent-bg: #FAFAFA;
    --success: #171717; --danger: #DC2626;
    --radius: 4px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }

  /* Top Bar — ultra minimal */
  #topbar {
    background: #fff; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 48px; position: sticky; top: 0; z-index: 100;
  }
  #brand { font-weight: 600; font-size: 14px; cursor: pointer; letter-spacing: -0.3px; color: var(--text); }
  #version { font-size: 11px; color: var(--text3); font-weight: 400; margin-left: 6px; }
  #topbar nav { display: flex; gap: 0; }
  #topbar nav button {
    font-size: 12px; font-weight: 400; color: var(--text2); background: transparent;
    border: none; border-radius: 0; padding: 6px 16px; cursor: pointer; font-family: inherit;
    transition: color 0.15s; letter-spacing: -0.2px;
  }
  #topbar nav button:hover { color: var(--text); }
  #topbar nav button.active { color: var(--text); font-weight: 500;
    box-shadow: inset 0 -1px 0 var(--text);
  }

  main { max-width: 960px; margin: 0 auto; padding: 40px 32px 80px; }

  .page-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 32px; }
  .page-header h2 { font-size: 20px; font-weight: 500; letter-spacing: -0.4px; }
  .back-link { font-size: 12px; color: var(--text2); cursor: pointer; transition: color 0.15s; }
  .back-link:hover { color: var(--text); }

  /* Status Bar — barely-there */
  .status-bar {
    padding: 0 0 28px; margin-bottom: 8px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .btn { font-size: 12px; font-weight: 500; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; transition: all 0.1s; display: inline-flex; align-items: center; gap: 4px; }
  .btn-accent { background: var(--accent); color: #fff; border: none; }
  .btn-accent:hover { background: #404040; }
  .btn-outline { background: transparent; border: 1px solid var(--border-strong); color: var(--text2); }
  .btn-outline:hover { border-color: #A3A3A3; color: var(--text); }
  .btn-ghost { background: transparent; border: none; color: var(--text2); padding: 4px 8px; }
  .btn-ghost:hover { color: var(--text); }

  .speaker-filter { display: flex; gap: 14px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; font-size: 12px; }
  .speaker-filter label { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text2); margin: 0; font-size: 12px; font-weight: 400; }
  .speaker-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; }

  /* Segment Card */
  .segment-card {
    background: #fff; border: 1px solid var(--border); border-radius: 0;
    margin-bottom: -1px; transition: background 0.1s;
  }
  .segment-card:hover { background: #FAFAFA; }
  .seg-header {
    display: flex; align-items: center; gap: 12px; padding: 14px 20px;
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .seg-speaker {
    font-size: 11px; font-weight: 500; padding: 1px 8px; border-radius: 2px;
    letter-spacing: 0.2px;
  }
  .seg-time { font-size: 11px; color: var(--text3); font-weight: 400; font-variant-numeric: tabular-nums; }
  .seg-badge {
    font-size: 10px; padding: 1px 8px; border-radius: 2px; font-weight: 400; border: 1px solid var(--border-strong); color: var(--text2);
  }
  .seg-spacer { flex: 1; }
  .seg-actions { display: flex; gap: 8px; align-items: center; }
  .btn-sm {
    font-size: 11px; padding: 4px 14px; border-radius: 4px; font-weight: 400;
    cursor: pointer; font-family: inherit; border: none; transition: all 0.1s;
  }
  .btn-sm.accent { background: var(--accent); color: #fff; }
  .btn-sm.accent:hover { background: #404040; }
  .btn-sm.outline { background: transparent; border: 1px solid var(--border-strong); color: var(--text2); }
  .btn-sm.outline:hover { border-color: #A3A3A3; color: var(--text); }
  .btn-sm.success { background: transparent; color: var(--text2); border: 1px solid var(--border-strong); }
  .btn-sm.ghost { color: var(--text2); background: transparent; padding: 3px 8px; font-size: 11px; }
  .btn-sm.ghost:hover { color: var(--text); }

  .seg-body { display: flex; flex-direction: column; gap: 0; padding: 0 20px; }
  .text-row { display: flex; gap: 12px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .text-row:last-child { border-bottom: none; }
  .play-dot {
    width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; color: var(--text2); transition: all 0.1s;
  }
  .play-dot:hover { color: var(--text); background: var(--surface); }
  .play-dot svg { width: 10px; height: 10px; fill: currentColor; }
  .text-orig {
    flex: 1; padding: 0; font-size: 13px; color: var(--text2); line-height: 1.6; word-break: break-word;
  }
  textarea.text-edit {
    flex: 1; padding: 6px 0; font-size: 13px; color: var(--text); font-family: inherit;
    resize: vertical; min-height: 28px; line-height: 1.6; border: none; background: transparent;
    outline: none;
  }
  textarea.text-edit:focus { background: #FAFAFA; padding: 6px 8px; margin: 0 -8px; }

  .seg-between {
    height: 28px; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.1s;
  }
  .seg-between:hover { opacity: 1; }
  .seg-between-inner { display: flex; gap: 12px; }

  .emo-btn {
    font-size: 11px; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border-strong);
    background: transparent; color: var(--text2); cursor: pointer; font-family: inherit;
    transition: all 0.1s; font-weight: 400;
  }
  .emo-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  #task-panel {
    position: fixed; bottom: 0; right: 28px; width: 280px;
    background: #fff; border: 1px solid var(--border-strong);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.02), 0 2px 12px rgba(0,0,0,0.04);
    z-index: 100; font-size: 12px;
  }
  #task-panel-header {
    padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between;
    font-weight: 500; border-bottom: 1px solid var(--border); user-select: none;
    font-size: 12px;
  }
  #task-panel-body { padding: 10px 16px 16px; max-height: 200px; overflow-y: auto; }
  .task-item { padding: 6px 0; font-size: 11px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; color: var(--text2); }
  .task-item:last-child { border-bottom: none; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #E5E5E5; }
</style>
</head>
<body>

<header id="topbar">
  <div style="display:flex;align-items:baseline">
    <span id="brand">VoiceDub</span>
    <span id="version">v1.0.0</span>
  </div>
  <nav>
    <button class="active">项目</button>
    <button>音色库</button>
    <button>模型管理</button>
    <button>设置</button>
  </nav>
</header>

<main>
  <div class="page-header">
    <span class="back-link">← 返回</span>
    <h2>配音项目_2026-06-03</h2>
    <div></div>
  </div>

  <div class="status-bar">
    <button class="btn btn-accent">批量配音</button>
    <button class="btn btn-outline">批量克隆</button>
    <button class="btn btn-outline">导出音频</button>
    <button class="btn btn-outline">SRT</button>
    <button class="btn btn-outline">ASS</button>
  </div>

  <div class="speaker-filter">
    <label><input type="checkbox" checked> 全选</label>
    <span style="color:var(--text3);font-size:11px">说话人</span>
    <label><span class="speaker-dot" style="background:#737373"></span> <input type="checkbox" checked> 张三</label>
    <label><span class="speaker-dot" style="background:#A3A3A3"></span> <input type="checkbox" checked> 李四</label>
    <label><span class="speaker-dot" style="background:#D4D4D4"></span> <input type="checkbox" checked> 王五</label>
  </div>

  <div id="segments">
    <div class="segment-card">
      <div class="seg-header">
        <input type="checkbox" class="seg-checkbox" checked>
        <span class="seg-speaker" style="background:#F5F5F5;color:#404040">张三</span>
        <span class="seg-time">0.0 – 3.2s</span>
        <span class="seg-badge">已配音</span>
        <span class="seg-spacer"></span>
        <div class="seg-actions">
          <button class="emo-btn active">情绪</button>
          <button class="btn-sm accent">重新配音</button>
          <button class="btn-sm outline">克隆</button>
          <button class="btn-sm success">下载</button>
        </div>
      </div>
      <div class="seg-body">
        <div class="text-row">
          <span class="play-dot"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <div class="text-orig">大家好，欢迎收听今天的节目。今天我们聊一个有趣的话题。</div>
        </div>
        <div class="text-row">
          <span class="play-dot"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <textarea class="text-edit">大家好，欢迎收听今天的节目。今天我们聊一个有趣的话题。</textarea>
        </div>
      </div>
    </div>

    <div class="seg-between"><div class="seg-between-inner"><button class="btn-sm ghost">+ 插入</button><button class="btn-sm ghost">合并</button></div></div>

    <div class="segment-card">
      <div class="seg-header">
        <input type="checkbox" class="seg-checkbox" checked>
        <span class="seg-speaker" style="background:#F5F5F5;color:#404040">李四</span>
        <span class="seg-time">3.5 – 7.8s</span>
        <span class="seg-spacer"></span>
        <div class="seg-actions">
          <button class="emo-btn">情绪</button>
          <button class="btn-sm accent">开始配音</button>
          <button class="btn-sm outline">克隆</button>
        </div>
      </div>
      <div class="seg-body">
        <div class="text-row">
          <span class="play-dot"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <div class="text-orig">是啊，这个话题确实很有意思。</div>
        </div>
        <div class="text-row">
          <span class="play-dot" style="visibility:hidden"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <textarea class="text-edit" placeholder="编辑台词...">是啊，这个话题确实很有意思。</textarea>
        </div>
      </div>
    </div>

    <div class="seg-between"><div class="seg-between-inner"><button class="btn-sm ghost">+ 插入</button><button class="btn-sm ghost">合并</button></div></div>

    <div class="segment-card">
      <div class="seg-header">
        <input type="checkbox" class="seg-checkbox" checked>
        <span class="seg-speaker" style="background:#F5F5F5;color:#404040">王五</span>
        <span class="seg-time">8.1 – 12.6s</span>
        <span class="seg-badge">已配音</span>
        <span class="seg-spacer"></span>
        <div class="seg-actions">
          <button class="emo-btn active">情绪</button>
          <button class="btn-sm accent">重新配音</button>
          <button class="btn-sm outline">克隆</button>
          <button class="btn-sm success">下载</button>
        </div>
      </div>
      <div class="seg-body">
        <div class="text-row">
          <span class="play-dot"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <div class="text-orig">那我们开始吧，先从第一个问题说起。</div>
        </div>
        <div class="text-row">
          <span class="play-dot"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></span>
          <textarea class="text-edit">那我们开始吧，先从第一个问题说起。</textarea>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="task-panel">
  <div id="task-panel-header"><span>任务</span><span>2</span></div>
  <div id="task-panel-body">
    <div class="task-item"><span>批量配音 · 张三 0.0–3.2s</span><span>完成 2.1s</span></div>
    <div class="task-item"><span>批量配音 · 王五 8.1–12.6s</span><span>处理中...</span></div>
  </div>
</div>

</body>
</html>
